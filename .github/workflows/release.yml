name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.28.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm lint

      - name: Build production assets
        run: pnpm build

      - name: Build release package
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="$(./bin/build-release.sh "$version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.archive }}#Sidebar Colors ${{ steps.package.outputs.version }}" \
            --generate-notes \
            --title "Sidebar Colors ${{ steps.package.outputs.version }}" \
            --verify-tag
